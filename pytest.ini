[pytest]
testpaths = tests
pythonpath = .
# Optional: always emit Allure raw data (then: allure serve reports/allure)
# addopts = --alluredir=reports/allure
markers =
    appium: Android UI tests driven by Appium (run in the appium-android CI job)
    regression: Release/regression checks (API + web + optional Appium when run)
    smoke: Fast critical checks (e.g. Business Standard smoke job in CI)
    business_standard: Tests for https://www.business-standard.com/ (requires matching BASE_URL)
