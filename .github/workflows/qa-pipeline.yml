# QA pipeline for https://github.com/praofficial-alt/QA
# Trigger: push/PR to main, or manual run.

name: QA Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override QA base URL (optional)"
        required: false
        default: ""

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  qa:
    name: API (Newman) + UI (Playwright)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pytest.ini
            playwright.config.py

      - name: Setup Node (Newman / Postman)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Newman (global)
        run: npm install -g newman

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Prepare report folders
        run: mkdir -p reports/allure reports/excel

      # Flow: API (Postman) → UI (Playwright) → Excel + artifacts → Slack
      # Manual run: set workflow input base_url. Otherwise: repo variable QA_BASE_URL, else example.com
      - name: Run Postman collection (Newman)
        if: ${{ hashFiles('tests/api/postman/collection.json') != '' }}
        env:
          BASE_URL: ${{ github.event.inputs && github.event.inputs.base_url != '' && github.event.inputs.base_url || vars.QA_BASE_URL || 'https://example.com' }}
        run: |
          newman run tests/api/postman/collection.json \
            -e tests/api/postman/qa.postman_environment.json \
            -r cli,junit,json \
            --reporter-junit-export reports/junit-newman.xml \
            --reporter-json-export reports/api.json \
            --env-var "baseUrl=$BASE_URL"

      - name: Run pytest (Playwright web — excludes @appium)
        env:
          BASE_URL: ${{ github.event.inputs && github.event.inputs.base_url != '' && github.event.inputs.base_url || vars.QA_BASE_URL || 'https://example.com' }}
        run: |
          python -m pytest tests/ -v --tb=short -m "not appium and not business_standard" \
            --junitxml=reports/junit-pytest.xml \
            --alluredir=reports/allure

      - name: Business Standard — smoke (API + Playwright)
        env:
          BASE_URL: https://www.business-standard.com
        run: |
          python -m pytest tests/ -v --tb=short \
            -m "business_standard and smoke and not appium" \
            --junitxml=reports/junit-bs-smoke.xml \
            --alluredir=reports/allure

      - name: Business Standard — regression (API + Playwright)
        env:
          BASE_URL: https://www.business-standard.com
        run: |
          python -m pytest tests/ -v --tb=short \
            -m "business_standard and regression and not appium" \
            --junitxml=reports/junit-bs-regression.xml \
            --alluredir=reports/allure

      - name: Generate Excel report
        if: always()
        run: python -m utils.excel_report

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QA-Reports
          path: reports/
          if-no-files-found: ignore

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_CONCLUSION: ${{ job.conclusion }}
        run: |
          python3 << 'EOF'
          import json
          import os
          import urllib.error
          import urllib.request

          url = (os.environ.get("SLACK_WEBHOOK_URL") or "").strip()
          if not url:
              print("SLACK_WEBHOOK_URL secret not set; skipping Slack notify.")
              raise SystemExit(0)

          conclusion = os.environ.get("JOB_CONCLUSION", "unknown")
          emoji = "✅" if conclusion == "success" else "❌"
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          server = os.environ.get("GITHUB_SERVER_URL", "https://github.com").rstrip("/")
          link = f"{server}/{repo}/actions/runs/{run_id}"
          text = f"{emoji} QA Pipeline ({repo}) — job **{conclusion}**\n<{link}|View run>"
          body = json.dumps({"text": text}).encode("utf-8")
          req = urllib.request.Request(
              url,
              data=body,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  print("Slack notify HTTP", resp.status)
          except urllib.error.URLError as e:
              print("Slack notify failed (non-blocking):", e)
          EOF

  appium-android:
    name: Mobile (Appium Android)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-appium.txt
            pytest.ini
            appium_config.py

      - name: Setup Node (Appium 2)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python dependencies (Appium only)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-appium.txt

      - name: Appium smoke on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: |
            set -e
            mkdir -p reports/allure reports/excel
            trap 'cp /tmp/appium.log reports/appium-server.log 2>/dev/null || true' EXIT
            npm install -g appium@2
            # Driver v5+ requires Appium 3; pin v4 for appium@2 (see appium-uiautomator2-driver peerDependencies)
            appium driver install uiautomator2@4.2.9
            appium --port 4723 --base-path / > /tmp/appium.log 2>&1 &
            echo "Waiting for Appium /status..."
            i=0
            until curl -sf http://127.0.0.1:4723/status >/dev/null; do
              i=$((i + 1))
              if [ "$i" -ge 45 ]; then
                echo "Appium did not become ready in time. Log:"
                cat /tmp/appium.log || true
                exit 1
              fi
              sleep 2
            done
            adb devices
            python -m pytest tests/ui/appium/ -v --tb=short -m appium \
              --junitxml=reports/junit-appium.xml \
              --alluredir=reports/allure
        env:
          APPIUM_SERVER_URL: http://127.0.0.1:4723

      - name: Upload Appium reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-appium-reports-${{ github.run_id }}
          path: |
            reports/
          if-no-files-found: ignore
